name: SupaChat CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build Backend Image
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/supachat-backend ./backend

      # 4. Build Frontend Image
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/supachat-frontend ./frontend

      # 5. Push Backend Image
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/supachat-backend

      # 6. Push Frontend Image
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/supachat-frontend