version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "10000:10000"

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend